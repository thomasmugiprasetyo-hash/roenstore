<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roenz Store</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav>

<div class="logo">
ROENZ STORE
</div>


<div class="menu">

<a href="#">Home</a>
<a href="#">Produk</a>
<a href="#">Pembayaran</a>
<a href="#">Kontak</a>

<a href="#" onclick="bukaKeranjang()">
🛒 Keranjang <span id="jumlah">0</span>
</a>

</div>

</nav>





<section class="hero">


<h1>Premium Digital Marketplace</h1>


<p>
Jual APK Premium, Canva, Netflix,
Template dan Produk Digital lainnya.
</p>


<input
type="text"
placeholder="Cari produk..."
id="search">


</section>






<section class="products">



<div class="card">


<img src="https://picsum.photos/300/200?1">


<h2>Duolingo Premium</h2>


<p class="price">50000</p>


<button onclick="tambahKeranjang('Duolingo Premium',50000)">
Beli Sekarang
</button>


</div>





<div class="card">


<img src="https://picsum.photos/300/200?3">


<h2>Netflix Premium</h2>


<p class="price">35000</p>


<button onclick="tambahKeranjang('Netflix Premium',35000)">
Beli Sekarang
</button>


</div>



</section>





<!-- KERANJANG POPUP -->

<div id="cartBox" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:300px;
padding:20px;
margin:0;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
z-index:9999;
">


<h2>🛒 Keranjang</h2>


<div id="isiKeranjang">
Belum ada barang
</div>


<h3 id="total">
Total: Rp 0
</h3>


<button onclick="checkout()">
Checkout
</button>


</div>







<footer>

© 2026 Roenz Store

</footer>





<script src="script.js"></script>


</body>

</html>
