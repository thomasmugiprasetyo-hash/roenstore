<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Produk</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav>

<div class="logo">
ROENZ STORE
</div>

</nav>




<div class="detail">


<img id="gambarProduk">


<h1 id="namaProduk"></h1>


<h2 id="hargaProduk"></h2>


<p id="deskripsiProduk"></p>



<div class="buyArea">


<button class="cartBtn">
🛒
</button>


<button class="buyBtn">
Beli Sekarang
</button>


</div>



</div>





<script>


let data = JSON.parse(localStorage.getItem("produk"));



document.getElementById("gambarProduk").src=data.gambar;


document.getElementById("namaProduk").innerText=data.nama;


document.getElementById("hargaProduk").innerText=
"Rp "+data.harga;


document.getElementById("deskripsiProduk").innerText=data.deskripsi;



</script>


</body>

</html>
